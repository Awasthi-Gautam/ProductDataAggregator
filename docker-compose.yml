services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: da-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-data_aggregation}
      POSTGRES_USER: ${POSTGRES_USER:-dauser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dapassword}
    ports:
      - "5433:5432"   # 5432 is in use by local Postgres; host uses 5433
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dauser} -d ${POSTGRES_DB:-data_aggregation}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Elasticsearch ─────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: da-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: da-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Spring Boot App ───────────────────────────────────────────────────────
  app:
    build: .
    container_name: da-app
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-data_aggregation}
      POSTGRES_USER: ${POSTGRES_USER:-dauser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dapassword}
      ELASTICSEARCH_URI: http://elasticsearch:9200
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FLIPKART_AFFILIATE_ID: ${FLIPKART_AFFILIATE_ID:-}
      FLIPKART_AFFILIATE_TOKEN: ${FLIPKART_AFFILIATE_TOKEN:-}
      AMAZON_AFFILIATE_TAG: ${AMAZON_AFFILIATE_TAG:-}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      GOOGLE_CSE_API_KEY: ${GOOGLE_CSE_API_KEY:-}
      GOOGLE_CSE_CX: ${GOOGLE_CSE_CX:-}
      TWITTER_BEARER_TOKEN: ${TWITTER_BEARER_TOKEN:-}
      INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN:-}
      TIKTOK_CLIENT_KEY: ${TIKTOK_CLIENT_KEY:-}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET:-}
      PINTEREST_ACCESS_TOKEN: ${PINTEREST_ACCESS_TOKEN:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ── React Dashboard (Nginx) ───────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: da-frontend
    depends_on:
      - app
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  postgres-data:
  elasticsearch-data:
  redis-data:
