spring:
  application:
    name: data-aggregation

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/data_aggregation}
    username: ${POSTGRES_USER:dauser}
    password: ${POSTGRES_PASSWORD:dapassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Elasticsearch ──────────────────────────────────────────────────────
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

  # ── Redis ──────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # ── Kafka ──────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: data-aggregation-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# ── Actuator ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ── App Config ────────────────────────────────────────────────────────────
app:
  region:
    country: IN
    name: India
  collectors:
    enabled: true
    interval-ms: 300000  # 5 minutes between collection runs
