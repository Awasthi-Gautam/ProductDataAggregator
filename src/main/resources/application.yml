spring:
  application:
    name: data-aggregation

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/data_aggregation}
    username: ${POSTGRES_USER:dauser}
    password: ${POSTGRES_PASSWORD:dapassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Elasticsearch ──────────────────────────────────────────────────────
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

  # ── Redis ──────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# ── Actuator ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ── App Config ────────────────────────────────────────────────────────────
app:
  region:
    country: IN
    name: India
  collectors:
    enabled: true
    # Stage 1 (discovery) runs every hour
    # Stage 2 (enrichment) runs 10 min after discovery
    # Stage 3 (scoring) runs 10 min after enrichment
    discovery-cron: "0 0 * * * *"    # top of every hour
    enrichment-cron: "0 10 * * * *"  # 10 min past every hour
    scoring-cron: "0 20 * * * *"     # 20 min past every hour
  youtube:
    api-key: ${YOUTUBE_API_KEY:}      # set in .env — free quota: 10,000 units/day (100 searches)
  google:
    cse-api-key: ${GOOGLE_CSE_API_KEY:}   # Google Custom Search API key (can reuse YouTube key)
    cse-cx: ${GOOGLE_CSE_CX:}            # Search Engine ID from programmablesearchengine.google.com
  flipkart:
    affiliate-id: ${FLIPKART_AFFILIATE_ID:}       # from affiliate.flipkart.com → API Access
    affiliate-token: ${FLIPKART_AFFILIATE_TOKEN:} # from affiliate.flipkart.com → API Access
  amazon:
    affiliate-tag: ${AMAZON_AFFILIATE_TAG:}       # from affiliate-program.amazon.in → your tracking ID
  reddit:
    client-id: ${REDDIT_CLIENT_ID:}           # from reddit.com/prefs/apps → script app ID
    client-secret: ${REDDIT_CLIENT_SECRET:}   # from reddit.com/prefs/apps → secret
    username: ${REDDIT_USERNAME:data-aggregation-bot}  # your Reddit account username
