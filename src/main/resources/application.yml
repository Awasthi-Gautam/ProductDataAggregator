spring:
  application:
    name: data-aggregation

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/data_aggregation}
    username: ${POSTGRES_USER:dauser}
    password: ${POSTGRES_PASSWORD:dapassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Elasticsearch ──────────────────────────────────────────────────────
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

  # ── Redis ──────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# ── Actuator ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ── App Config ────────────────────────────────────────────────────────────
app:
  region:
    country: IN
    name: India
  collectors:
    enabled: true
    # Stage 1 (discovery) runs every hour
    # Stage 2 (enrichment) runs 10 min after discovery
    # Stage 3 (scoring) runs 10 min after enrichment
    discovery-cron: "0 0 * * * *"    # top of every hour
    enrichment-cron: "0 10 * * * *"  # 10 min past every hour
    scoring-cron: "0 20 * * * *"     # 20 min past every hour
  youtube:
    api-key: ${YOUTUBE_API_KEY:}      # set in .env — free quota: 100 searches/day
